services:
  voicebox:
    build: .
    container_name: voicebox
    restart: unless-stopped

    ports:
      # Bind to localhost only for security
      - "127.0.0.1:17493:17493"

    volumes:
      # Bind-mount for generated audio (customize the host path as needed)
      # Host side:      ./output/
      # Container side: /app/data/generations/
      - ./output:/app/data/generations

      # Named volume for profiles, DB, cache (persists across container restarts)
      - voicebox-data:/app/data

      # Numba JIT compilation cache (persists across restarts for faster startup)
      - numba-cache:/home/voicebox/.cache/numba

    environment:
      - LOG_LEVEL=info
      - NUMBA_CACHE_DIR=/home/voicebox/.cache/numba
      # Keep HF cache under /app/data so the non-root user can always write.
      - HF_HUB_CACHE=/app/data/cache/huggingface/hub

    networks:
      - voicebox-net

    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G

networks:
  voicebox-net:
    driver: bridge

volumes:
  voicebox-data:
  numba-cache:
